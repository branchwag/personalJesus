services:
  ollama:
    image: ollama/ollama:latest
    container_name: personal-jesus-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  model-puller:
    image: ollama/ollama:latest
    container_name: personal-jesus-model-puller
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling model..."
        ollama pull qwen2.5:7b
        echo "Model pulled successfully!"
    restart: "no"

  web:
    build: .
    container_name: personal-jesus-web
    depends_on:
      ollama:
        condition: service_healthy
      model-puller:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - PORT=8080
      - OLLAMA_URL=http://ollama:11434
      - MODEL_NAME=qwen2.5:7b
    restart: unless-stopped

volumes:
  ollama_data:
