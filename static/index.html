<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Jesus - An AI Chatbot</title>
    <style>
      @font-face {
        font-family: 'Special Elite';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(/fonts/SpecialElite.ttf) format('truetype');
      }
    </style>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Special Elite", monospace;
        background-color: #0a0a0a;
        color: #ededed;
        height: 100vh;
        display: flex;
      }

      .sidebar {
        width: 280px;
        min-width: 280px;
        background-color: #111;
        border-right: 1px solid #222;
        display: flex;
        flex-direction: column;
        height: 100vh;
        transition: width 0.2s ease, min-width 0.2s ease;
      }

      .sidebar.collapsed {
        width: 0;
        min-width: 0;
        overflow: hidden;
        border-right: none;
      }

      .toggle-sidebar {
        background: #111;
        border: 1px solid #222;
        border-right: none;
        color: #6b7280;
        cursor: pointer;
        font-size: 0.65rem;
        padding: 0;
        width: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s, background-color 0.15s;
        z-index: 5;
        border-radius: 0;
        flex-shrink: 0;
        white-space: nowrap;
      }
      .toggle-sidebar:hover {
        color: #ededed;
        background-color: #1a1a1a;
      }

      .sidebar-header {
        padding: 1rem;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .sidebar-header h2 {
        font-size: 1.1rem;
        white-space: nowrap;
      }

      .sidebar-header button {
        padding: 0.4rem 0.75rem;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .chat-list {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .chat-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 0.75rem;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: background-color 0.15s;
        user-select: none;
      }

      .chat-item:hover {
        background-color: #1a1a1a;
      }

      .chat-item.active {
        background-color: #1f2937;
      }

      .chat-title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.9rem;
      }

      .delete-btn {
        background: none;
        border: none;
        color: #6b7280;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0.1rem 0.3rem;
        border-radius: 0.25rem;
        line-height: 1;
        opacity: 0;
        transition: opacity 0.15s, color 0.15s;
      }

      .chat-item:hover .delete-btn {
        opacity: 1;
      }

      .delete-btn:hover {
        color: #ef4444;
        background-color: rgba(239, 68, 68, 0.1);
      }

      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        min-width: 0;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #222;
        font-size: 1.25rem;
      }

      .chat-header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .message {
        padding: 1rem;
        border-radius: 0.5rem;
        max-width: 80%;
        word-wrap: break-word;
        white-space: pre-wrap;
      }

      .message.user {
        background-color: #f3f4f6;
        color: #000;
        margin-left: auto;
        margin-right: 0;
      }

      .message.assistant {
        background-color: #1f2937;
        color: #fff;
        margin-right: auto;
        margin-left: 0;
      }

      .message.loading {
        background-color: #374151;
        color: #9ca3af;
        margin-right: auto;
      }

      .empty-state {
        margin: auto;
        text-align: center;
        color: #6b7280;
        font-size: 1.1rem;
      }

      .input-container {
        display: flex;
        gap: 0.5rem;
        padding: 1rem;
        border-top: 1px solid #222;
      }

      input[type="text"] {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid #374151;
        border-radius: 0.375rem;
        font-family: inherit;
        font-size: 1rem;
        background-color: #fff;
        color: #000;
      }

      button {
        padding: 0.75rem 1.5rem;
        background-color: #1f2937;
        color: white;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        font-family: inherit;
        font-size: 1rem;
        transition: background-color 0.2s;
      }

      button:hover:not(:disabled) {
        background-color: #374151;
      }

      button:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
      }

      /* Tool call modal */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.7);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.visible {
        display: flex;
      }

      .modal {
        background-color: #1f2937;
        border: 1px solid #374151;
        border-radius: 0.5rem;
        padding: 1.5rem;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }

      .modal h3 {
        margin-bottom: 1rem;
        color: #fbbf24;
        font-size: 1.1rem;
      }

      .tool-call-item {
        background-color: #111;
        border: 1px solid #374151;
        border-radius: 0.375rem;
        padding: 0.75rem;
        margin-bottom: 0.75rem;
        font-size: 0.85rem;
      }

      .tool-call-name {
        color: #60a5fa;
        font-weight: bold;
        margin-bottom: 0.25rem;
      }

      .tool-call-detail {
        color: #d1d5db;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .modal-buttons {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
        margin-top: 1rem;
      }

      .btn-confirm {
        background-color: #2563eb;
      }

      .btn-confirm:hover {
        background-color: #3b82f6;
      }

      .btn-deny {
        background-color: #dc2626;
      }

      .btn-deny:hover {
        background-color: #ef4444;
      }

      .save-btn {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.35rem 0.75rem;
        font-size: 0.8rem;
        background-color: #2563eb;
        color: #fff;
        border: none;
        border-radius: 0.25rem;
        cursor: pointer;
        font-family: inherit;
      }
      .save-btn:hover {
        background-color: #3b82f6;
      }
      .save-btn.saved {
        background-color: #16a34a;
        cursor: default;
      }

      .message pre {
        background-color: #111;
        border: 1px solid #333;
        border-radius: 0.375rem;
        padding: 0.75rem;
        margin: 0.5rem 0;
        overflow-x: auto;
      }

      .message code {
        font-size: 0.9rem;
      }

      @media (max-width: 640px) {
        .sidebar {
          width: 200px;
          min-width: 200px;
        }
        .message {
          max-width: 90%;
        }
        .modal {
          max-width: 95%;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <button id="newChatBtn">+ New</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </aside>
    <button id="toggleSidebar" class="toggle-sidebar" title="Collapse sidebar">◀</button>

    <main class="main-content">
      <div class="chat-header">
        <div class="chat-header-left">
          <span>🎵 Personal Jesus 🎵</span>
        </div>

      </div>
      <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">Select a chat or create a new one</div>
      </div>
      <div class="input-container">
        <input
          type="text"
          id="messageInput"
          placeholder="Type your message..."
          autocomplete="off"
        />
        <button id="sendButton">Send</button>
      </div>
    </main>

    <!-- Tool confirmation modal -->
    <div class="modal-overlay" id="toolModal">
      <div class="modal">
        <h3>🔧 AI wants to use tools</h3>
        <div id="toolCallsList"></div>
        <div class="modal-buttons">
          <button class="btn-deny" id="denyBtn">Deny</button>
          <button class="btn-confirm" id="confirmBtn">Confirm</button>
        </div>
      </div>
    </div>

    <script>
      const chatList = document.getElementById("chatList");
      const chatContainer = document.getElementById("chatContainer");
      const emptyState = document.getElementById("emptyState");
      const messageInput = document.getElementById("messageInput");
      const sendButton = document.getElementById("sendButton");
      const newChatBtn = document.getElementById("newChatBtn");

      const toolModal = document.getElementById("toolModal");
      const toolCallsList = document.getElementById("toolCallsList");
      const confirmBtn = document.getElementById("confirmBtn");
      const denyBtn = document.getElementById("denyBtn");

      let isLoading = false;
      let loadingChatId = null;
      let activeChatId = null;
      let chats = [];

      let pendingSessionId = null;
      let pendingToolCalls = [];

      function formatTime(dateStr) {
        const d = new Date(dateStr + "Z");
        return d.toLocaleString();
      }

      function renderChatList() {
        chatList.innerHTML = "";
        for (const chat of chats) {
          const div = document.createElement("div");
          div.className = "chat-item" + (chat.id === activeChatId ? " active" : "");
          div.dataset.id = chat.id;

          const title = document.createElement("span");
          title.className = "chat-title";
          title.textContent = chat.title;

          const del = document.createElement("button");
          del.className = "delete-btn";
          del.textContent = "\u00d7";
          del.title = "Delete chat";
          del.addEventListener("click", (e) => {
            e.stopPropagation();
            deleteChat(chat.id);
          });

          div.appendChild(title);
          div.appendChild(del);
          div.addEventListener("click", () => selectChat(chat.id));
          chatList.appendChild(div);
        }
      }

      function extractCodeBlocks(text) {
        const blocks = [];
        const re = /```(\w*)\n([\s\S]*?)```/g;
        let match;
        while ((match = re.exec(text)) !== null) {
          blocks.push({ language: match[1], code: match[2] });
        }
        return blocks;
      }

      async function saveCodeBlock(code, filename) {
        try {
          const res = await fetch("/api/write-file", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: filename, content: code }),
          });
        const data = await res.json();
        if (res.ok) return "Saved: " + (data.path || filename);
        else return "Error: " + (data.error || "save failed");
        } catch (e) {
          return "Error: " + e.message;
        }
      }

      function addMessage(content, role) {
        removeEmptyState();
        const messageDiv = document.createElement("div");
        messageDiv.className = "message " + role;

        const codeBlockRe = /```(\w*)\n([\s\S]*?)```/g;
        let lastIndex = 0;
        let match;
        while ((match = codeBlockRe.exec(content)) !== null) {
          if (match.index > lastIndex) {
            messageDiv.appendChild(document.createTextNode(content.slice(lastIndex, match.index)));
          }
          const lang = match[1];
          const code = match[2];
          const pre = document.createElement("pre");
          const codeEl = document.createElement("code");
          if (lang) codeEl.className = "language-" + lang;
          codeEl.textContent = code;
          pre.appendChild(codeEl);
          messageDiv.appendChild(pre);
          lastIndex = match.index + match[0].length;
        }
        if (lastIndex < content.length) {
          messageDiv.appendChild(document.createTextNode(content.slice(lastIndex)));
        }
        if (!messageDiv.hasChildNodes() && content) {
          messageDiv.textContent = content;
        }

        chatContainer.appendChild(messageDiv);

        if (role === "assistant") {
          const blocks = extractCodeBlocks(content);
          for (const block of blocks) {
            if (!block.code.trim()) continue;
            const lang = block.language || "script";
            const btn = document.createElement("button");
            btn.className = "save-btn";
            btn.textContent = "Save " + lang;
            btn.addEventListener("click", async () => {
              const ext = { python: "py", javascript: "js", bash: "sh", ruby: "rb", go: "go", rust: "rs" }[block.language] || block.language || "sh";
              const name = prompt("Save as:", "/tmp/script." + ext);
              if (!name) return;
              btn.textContent = "Saving...";
              btn.disabled = true;
              const result = await saveCodeBlock(block.code, name);
              btn.textContent = result;
              if (result.startsWith("Saved")) btn.classList.add("saved");
              btn.disabled = false;
            });
            chatContainer.appendChild(btn);
          }
        }

        chatContainer.scrollTop = chatContainer.scrollHeight;
        return messageDiv;
      }

      function addLoadingMessage() {
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message loading";
        loadingDiv.textContent = "Thinking...";
        loadingDiv.id = "loadingMessage";
        chatContainer.appendChild(loadingDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return loadingDiv;
      }

      function removeEmptyState() {
        const es = document.getElementById("emptyState");
        if (es) es.remove();
      }

      function showEmptyState() {
        chatContainer.innerHTML =
          '<div class="empty-state" id="emptyState">Select a chat or create a new one</div>';
      }

      async function loadChats() {
        try {
          const res = await fetch("/api/chats");
          chats = await res.json();
          renderChatList();
        } catch (e) {
          console.error("Failed to load chats:", e);
        }
      }

      async function selectChat(id) {
        activeChatId = id;
        pendingSessionId = null;
        pendingToolCalls = [];
        renderChatList();
        chatContainer.innerHTML = "";
        messageInput.disabled = false;
        messageInput.focus();

        try {
          const res = await fetch("/api/chats/" + id + "/messages");
          const messages = await res.json();
          chatContainer.innerHTML = "";
          for (const msg of messages) {
            addMessage(msg.content, msg.role);
          }
          if (loadingChatId === id) {
            addLoadingMessage();
          }
          if (messages.length === 0 && loadingChatId !== id) {
            showEmptyState();
          }
        } catch (e) {
          console.error("Failed to load messages:", e);
          showEmptyState();
        }
      }

      async function deleteChat(id) {
        try {
          await fetch("/api/chats/" + id, { method: "DELETE" });
          chats = chats.filter((c) => c.id !== id);
          if (activeChatId === id) {
            activeChatId = null;
            pendingSessionId = null;
            pendingToolCalls = [];
            chatContainer.innerHTML = "";
            showEmptyState();
          }
          renderChatList();
        } catch (e) {
          console.error("Failed to delete chat:", e);
        }
      }

      async function createNewChat() {
        try {
          const res = await fetch("/api/chats", { method: "POST" });
          const chat = await res.json();
          chats.unshift(chat);
          renderChatList();
          await selectChat(chat.id);
        } catch (e) {
          console.error("Failed to create chat:", e);
        }
      }

      function updateChatTitle(id, title) {
        const chat = chats.find((c) => c.id === id);
        if (chat && chat.title === "New Chat") {
          chat.title = title;
          renderChatList();
        }
      }

      let pathInputs = [];

      function showToolModal(toolCalls, sessionId) {
        pendingToolCalls = toolCalls;
        pendingSessionId = sessionId;
        toolCallsList.innerHTML = "";
        pathInputs = [];

        for (let tcIdx = 0; tcIdx < toolCalls.length; tcIdx++) {
          const tc = toolCalls[tcIdx];
          const div = document.createElement("div");
          div.className = "tool-call-item";

          const nameDiv = document.createElement("div");
          nameDiv.className = "tool-call-name";
          nameDiv.textContent = tc.function.name;

          const detailDiv = document.createElement("div");
          detailDiv.className = "tool-call-detail";
          const args = tc.function.arguments || {};

          if (tc.function.name === "write_file") {
            const pathLabel = document.createElement("div");
            pathLabel.textContent = "Path:";
            const pathInput = document.createElement("input");
            pathInput.type = "text";
            pathInput.value = args.path || "/tmp/script.sh";
            pathInput.style.width = "100%";
            pathInput.style.marginBottom = "0.5rem";
            pathInput.style.fontFamily = "inherit";
            pathInput.style.padding = "0.3rem";
            pathInput.style.boxSizing = "border-box";
            const sizeText = document.createElement("div");
            sizeText.textContent = "Size: " + (args.content ? args.content.length : 0) + " bytes";
            const previewText = document.createElement("div");
            previewText.style.marginTop = "0.3rem";
            previewText.style.fontSize = "0.8rem";
            previewText.style.color = "#9ca3af";
            previewText.textContent = (args.content || "").substring(0, 120) + ((args.content || "").length > 120 ? "..." : "");
            detailDiv.appendChild(pathLabel);
            detailDiv.appendChild(pathInput);
            detailDiv.appendChild(sizeText);
            detailDiv.appendChild(previewText);
            pathInputs.push({ name: tc.function.name, index: tcIdx, input: pathInput });
          } else if (tc.function.name === "edit_file") {
            detailDiv.textContent = "Path: " + (args.path || "?") + "\nReplace: " + (args.old_string || "") + "\nWith: " + (args.new_string || "");
          } else {
            detailDiv.textContent = tc.function.name === "read_file" ? "Path: " + (args.path || "?")
              : tc.function.name === "run_command" ? "Command: " + (args.command || "?")
              : tc.function.name === "glob" ? "Pattern: " + (args.pattern || "?")
              : tc.function.name === "grep" ? "Pattern: " + (args.pattern || "?") + "\nPath: " + (args.path || ".")
              : tc.function.name === "read_directory" ? "Path: " + (args.path || "?")
              : JSON.stringify(args, null, 2);
          }

          div.appendChild(nameDiv);
          div.appendChild(detailDiv);
          toolCallsList.appendChild(div);
        }

        toolModal.classList.add("visible");
      }

      async function sendCodingMessage() {
        const message = messageInput.value.trim();
        if (!message || isLoading) return;

        if (!activeChatId) {
          await createNewChat();
        }

        addMessage(message, "user");
        messageInput.value = "";
        updateChatTitle(activeChatId, message.length > 50 ? message.substring(0, 50) + "..." : message);

        isLoading = true;
        loadingChatId = activeChatId;
        sendButton.disabled = true;
        addLoadingMessage();

        try {
          const response = await fetch("/api/chat/tools", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: activeChatId, message }),
          });

          const data = await response.json();
          document.getElementById("loadingMessage")?.remove();

          if (!response.ok) {
            addMessage("Error: " + (data.error || "Unknown server error"), "assistant");
          } else if (data.type === "text") {
            activeChatId = data.chat_id;
            if (!chats.find(c => c.id === data.chat_id)) {
              await loadChats();
            }
            if (data.content) {
              addMessage(data.content, "assistant");
            }
          } else if (data.type === "tool_calls") {
            showToolModal(data.tool_calls, data.session_id);
          }
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("loadingMessage")?.remove();
          addMessage("Sorry, there was an error processing your request.", "assistant");
        } finally {
          isLoading = false;
          loadingChatId = null;
          sendButton.disabled = false;
          messageInput.focus();
        }
      }

      async function sendMessage() {
        await sendCodingMessage();
      }

      async function handleToolConfirm() {
        if (!pendingSessionId) return;

        const modified = [];
        for (const pi of pathInputs) {
          if (pi.input.value !== pendingToolCalls[pi.index]?.function?.arguments?.path) {
            modified.push({ index: pi.index, path: pi.input.value });
          }
        }

        toolModal.classList.remove("visible");
        isLoading = true;
        loadingChatId = activeChatId;
        sendButton.disabled = true;
        addLoadingMessage();

        try {
          const response = await fetch("/api/chat/tools/confirm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_id: pendingSessionId,
              approved: true,
              modified_paths: modified.length > 0 ? modified : undefined,
            }),
          });

          const data = await response.json();
          document.getElementById("loadingMessage")?.remove();
          pendingSessionId = null;
          pendingToolCalls = [];
          pathInputs = [];

          if (!response.ok) {
            addMessage("Error: " + (data.error || "Unknown server error"), "assistant");
          } else if (data.type === "text") {
            if (data.content) {
              addMessage(data.content, "assistant");
            }
          } else if (data.type === "tool_calls") {
            showToolModal(data.tool_calls, data.session_id);
          }
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("loadingMessage")?.remove();
          addMessage("Sorry, there was an error processing your request.", "assistant");
        } finally {
          isLoading = false;
          loadingChatId = null;
          sendButton.disabled = false;
          messageInput.focus();
        }
      }

      async function handleToolDeny() {
        if (!pendingSessionId) return;

        toolModal.classList.remove("visible");
        isLoading = true;
        loadingChatId = activeChatId;
        sendButton.disabled = true;
        addLoadingMessage();

        try {
          const response = await fetch("/api/chat/tools/confirm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: pendingSessionId, approved: false }),
          });

          const data = await response.json();
          document.getElementById("loadingMessage")?.remove();
          pendingSessionId = null;
          pendingToolCalls = [];

          if (!response.ok) {
            addMessage("Error: " + (data.error || "Unknown server error"), "assistant");
          } else if (data.type === "text") {
            if (data.content) {
              addMessage(data.content, "assistant");
            }
          } else if (data.type === "tool_calls") {
            showToolModal(data.tool_calls, data.session_id);
          }
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("loadingMessage")?.remove();
          addMessage("Sorry, there was an error processing your request.", "assistant");
        } finally {
          isLoading = false;
          loadingChatId = null;
          sendButton.disabled = false;
          messageInput.focus();
        }
      }

      newChatBtn.addEventListener("click", createNewChat);
      sendButton.addEventListener("click", sendMessage);
      messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
      confirmBtn.addEventListener("click", handleToolConfirm);
      denyBtn.addEventListener("click", handleToolDeny);

      document.getElementById("toggleSidebar").addEventListener("click", () => {
        const sidebar = document.getElementById("sidebar");
        const btn = document.getElementById("toggleSidebar");
        sidebar.classList.toggle("collapsed");
        const isCollapsed = sidebar.classList.contains("collapsed");
        btn.textContent = isCollapsed ? "▶" : "◀";
        btn.title = isCollapsed ? "Expand sidebar" : "Collapse sidebar";
      });

      loadChats();
      messageInput.focus();
    </script>
  </body>
</html>
