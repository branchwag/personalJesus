<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Jesus - An AI Chatbot</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Special Elite", monospace;
        background-color: #0a0a0a;
        color: #ededed;
        height: 100vh;
        display: flex;
      }

      .sidebar {
        width: 280px;
        min-width: 280px;
        background-color: #111;
        border-right: 1px solid #222;
        display: flex;
        flex-direction: column;
        height: 100vh;
        transition: width 0.2s ease, min-width 0.2s ease;
      }

      .sidebar.collapsed {
        width: 0;
        min-width: 0;
        overflow: hidden;
        border-right: none;
      }

      .toggle-sidebar {
        background: #111;
        border: 1px solid #222;
        border-right: none;
        color: #6b7280;
        cursor: pointer;
        font-size: 0.65rem;
        padding: 0;
        width: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s, background-color 0.15s;
        z-index: 5;
        border-radius: 0;
        flex-shrink: 0;
        white-space: nowrap;
      }
      .toggle-sidebar:hover {
        color: #ededed;
        background-color: #1a1a1a;
      }

      .sidebar-header {
        padding: 1rem;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .sidebar-header h2 {
        font-size: 1.1rem;
        white-space: nowrap;
      }

      .sidebar-header button {
        padding: 0.4rem 0.75rem;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .chat-list {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .chat-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 0.75rem;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: background-color 0.15s;
        user-select: none;
      }

      .chat-item:hover {
        background-color: #1a1a1a;
      }

      .chat-item.active {
        background-color: #1f2937;
      }

      .chat-title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.9rem;
      }

      .delete-btn {
        background: none;
        border: none;
        color: #6b7280;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0.1rem 0.3rem;
        border-radius: 0.25rem;
        line-height: 1;
        opacity: 0;
        transition: opacity 0.15s, color 0.15s;
      }

      .chat-item:hover .delete-btn {
        opacity: 1;
      }

      .delete-btn:hover {
        color: #ef4444;
        background-color: rgba(239, 68, 68, 0.1);
      }

      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        min-width: 0;
      }

      .chat-header {
        text-align: center;
        padding: 1rem;
        border-bottom: 1px solid #222;
        font-size: 1.25rem;
      }

      .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .message {
        padding: 1rem;
        border-radius: 0.5rem;
        max-width: 80%;
        word-wrap: break-word;
        white-space: pre-wrap;
      }

      .message.user {
        background-color: #f3f4f6;
        color: #000;
        margin-left: auto;
        margin-right: 0;
      }

      .message.assistant {
        background-color: #1f2937;
        color: #fff;
        margin-right: auto;
        margin-left: 0;
      }

      .message.loading {
        background-color: #374151;
        color: #9ca3af;
        margin-right: auto;
      }

      .empty-state {
        margin: auto;
        text-align: center;
        color: #6b7280;
        font-size: 1.1rem;
      }

      .input-container {
        display: flex;
        gap: 0.5rem;
        padding: 1rem;
        border-top: 1px solid #222;
      }

      input[type="text"] {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid #374151;
        border-radius: 0.375rem;
        font-family: inherit;
        font-size: 1rem;
        background-color: #fff;
        color: #000;
      }

      button {
        padding: 0.75rem 1.5rem;
        background-color: #1f2937;
        color: white;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        font-family: inherit;
        font-size: 1rem;
        transition: background-color 0.2s;
      }

      button:hover:not(:disabled) {
        background-color: #374151;
      }

      button:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
      }

      @media (max-width: 640px) {
        .sidebar {
          width: 200px;
          min-width: 200px;
        }
        .message {
          max-width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <button id="newChatBtn">+ New</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </aside>
    <button id="toggleSidebar" class="toggle-sidebar" title="Collapse sidebar">◀</button>

    <main class="main-content">
      <div class="chat-header">🎵 Personal Jesus 🎵</div>
      <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">Select a chat or create a new one</div>
      </div>
      <div class="input-container">
        <input
          type="text"
          id="messageInput"
          placeholder="Type your message..."
          autocomplete="off"
        />
        <button id="sendButton">Send</button>
      </div>
    </main>

    <script>
      const chatList = document.getElementById("chatList");
      const chatContainer = document.getElementById("chatContainer");
      const emptyState = document.getElementById("emptyState");
      const messageInput = document.getElementById("messageInput");
      const sendButton = document.getElementById("sendButton");
      const newChatBtn = document.getElementById("newChatBtn");

      let isLoading = false;
      let activeChatId = null;
      let chats = [];

      function formatTime(dateStr) {
        const d = new Date(dateStr + "Z");
        return d.toLocaleString();
      }

      function renderChatList() {
        chatList.innerHTML = "";
        for (const chat of chats) {
          const div = document.createElement("div");
          div.className = "chat-item" + (chat.id === activeChatId ? " active" : "");
          div.dataset.id = chat.id;

          const title = document.createElement("span");
          title.className = "chat-title";
          title.textContent = chat.title;

          const del = document.createElement("button");
          del.className = "delete-btn";
          del.textContent = "\u00d7";
          del.title = "Delete chat";
          del.addEventListener("click", (e) => {
            e.stopPropagation();
            deleteChat(chat.id);
          });

          div.appendChild(title);
          div.appendChild(del);
          div.addEventListener("click", () => selectChat(chat.id));
          chatList.appendChild(div);
        }
      }

      function addMessage(content, role) {
        removeEmptyState();
        const messageDiv = document.createElement("div");
        messageDiv.className = "message " + role;
        messageDiv.textContent = content;
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return messageDiv;
      }

      function addLoadingMessage() {
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message loading";
        loadingDiv.textContent = "Thinking...";
        loadingDiv.id = "loadingMessage";
        chatContainer.appendChild(loadingDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return loadingDiv;
      }

      function removeEmptyState() {
        const es = document.getElementById("emptyState");
        if (es) es.remove();
      }

      function showEmptyState() {
        chatContainer.innerHTML =
          '<div class="empty-state" id="emptyState">Select a chat or create a new one</div>';
      }

      async function loadChats() {
        try {
          const res = await fetch("/api/chats");
          chats = await res.json();
          renderChatList();
        } catch (e) {
          console.error("Failed to load chats:", e);
        }
      }

      async function selectChat(id) {
        activeChatId = id;
        renderChatList();
        chatContainer.innerHTML = "";
        messageInput.disabled = false;
        messageInput.focus();

        try {
          const res = await fetch("/api/chats/" + id + "/messages");
          const messages = await res.json();
          chatContainer.innerHTML = "";
          for (const msg of messages) {
            addMessage(msg.content, msg.role);
          }
          if (messages.length === 0) {
            showEmptyState();
          }
        } catch (e) {
          console.error("Failed to load messages:", e);
          showEmptyState();
        }
      }

      async function deleteChat(id) {
        try {
          await fetch("/api/chats/" + id, { method: "DELETE" });
          chats = chats.filter((c) => c.id !== id);
          if (activeChatId === id) {
            activeChatId = null;
            chatContainer.innerHTML = "";
            showEmptyState();
          }
          renderChatList();
        } catch (e) {
          console.error("Failed to delete chat:", e);
        }
      }

      async function createNewChat() {
        try {
          const res = await fetch("/api/chats", { method: "POST" });
          const chat = await res.json();
          chats.unshift(chat);
          renderChatList();
          selectChat(chat.id);
        } catch (e) {
          console.error("Failed to create chat:", e);
        }
      }

      function updateChatTitle(id, title) {
        const chat = chats.find((c) => c.id === id);
        if (chat && chat.title === "New Chat") {
          chat.title = title;
          renderChatList();
        }
      }

      async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || isLoading) return;

        if (!activeChatId) {
          await createNewChat();
        }

        addMessage(message, "user");
        messageInput.value = "";

        isLoading = true;
        sendButton.disabled = true;
        const loadingDiv = addLoadingMessage();

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: activeChatId, message }),
          });

          const chatId = response.headers.get("X-Chat-Id");
          if (chatId && !activeChatId) {
            activeChatId = parseInt(chatId);
            await loadChats();
            selectChat(activeChatId);
          }

          loadingDiv.remove();

          const assistantDiv = addMessage("", "assistant");
          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            assistantDiv.textContent += chunk;
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }

          const title = message.length > 50 ? message.substring(0, 50) + "..." : message;
          updateChatTitle(activeChatId, title);
        } catch (error) {
          console.error("Error:", error);
          loadingDiv.remove();
          addMessage("Sorry, there was an error processing your request.", "assistant");
        } finally {
          isLoading = false;
          sendButton.disabled = false;
          messageInput.focus();
        }
      }

      newChatBtn.addEventListener("click", createNewChat);
      sendButton.addEventListener("click", sendMessage);
      messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      document.getElementById("toggleSidebar").addEventListener("click", () => {
        const sidebar = document.getElementById("sidebar");
        const btn = document.getElementById("toggleSidebar");
        sidebar.classList.toggle("collapsed");
        const isCollapsed = sidebar.classList.contains("collapsed");
        btn.textContent = isCollapsed ? "▶" : "◀";
        btn.title = isCollapsed ? "Expand sidebar" : "Collapse sidebar";
      });

      loadChats();
      messageInput.focus();
    </script>
  </body>
</html>
